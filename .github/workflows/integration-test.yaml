name: Integraton Test

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest
    container:
      image: alonza0314/nsctl-test:latest
      options: --privileged

    strategy:
      matrix:
        go: [ '1.25.5' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Make
        run: make test

      - name: Add netns Folder
        run: mkdir -p /var/run/netns

      - name: Namespace Test
        run: cd integration-test/namespace && ./test.sh

      - name: Veth Net Test
        run: cd integration-test/veth && ./test.sh

      - name: Exec Test
        run: cd integration-test/exec && ./test.sh

      - name: Remove netns Folder
        run: rm -rf /var/run/netns